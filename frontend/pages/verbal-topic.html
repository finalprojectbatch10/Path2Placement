errorDetection: {
  title: "Error Detection (Grammar)",

  concepts: `
    <h3 class="text-lg font-bold mb-3">Error Detection – Core Concepts</h3>
    <p class="mb-3">
      Error Detection questions test your ability to identify grammatical mistakes in a sentence.
      Usually, one part of the sentence contains an error.
    </p>

    <h4 class="font-semibold mt-4 mb-2">1️ Subject–Verb Agreement</h4>
    <p>The verb must agree with the subject in number and person.</p>
    <ul class="list-disc ml-6 space-y-1 text-gray-300">
      <li>Singular subject → singular verb</li>
      <li>Plural subject → plural verb</li>
      <li>Each, everyone, everybody → singular verb</li>
      <li>Subjects joined by 'along with', 'as well as' → verb agrees with first subject</li>
    </ul>
    <p><b>Example:</b>  Each of the students are present. ✔ Each of the students is present.</p>

    <h4 class="font-semibold mt-4 mb-2">2️ Tenses – Complete Explanation</h4>
    <p>Tenses tell us when an action happens — in the present, past, or future.</p>

    <h5 class="font-semibold mt-2 mb-1">Present Tense</h5>
    <ul class="list-disc ml-6 space-y-1 text-gray-300">
      <li><b>Present Simple:</b> Regular or habitual actions. <br>Structure: Subject + V¹ / V¹+s/es <br>Example: She works in a bank. Keywords: always, usually, often</li>
      <li><b>Present Continuous:</b> Action happening now. <br>Structure: Subject + is/am/are + V¹+ing <br>Example: She is reading a book. Keywords: now, currently</li>
      <li><b>Present Perfect:</b> Action completed recently or result important. <br>Structure: Subject + has/have + V³ <br>Example: I have finished my work. Keywords: just, already, yet</li>
      <li><b>Present Perfect Continuous:</b> Action started in past and still continuing. <br>Structure: Subject + has/have been + V¹+ing <br>Example: I have been studying for 2 hours. Keywords: since, for</li>
    </ul>

    <h5 class="font-semibold mt-2 mb-1">Past Tense</h5>
    <ul class="list-disc ml-6 space-y-1 text-gray-300">
      <li><b>Past Simple:</b> Completed action in past. <br>Structure: Subject + V² <br>Example: He went to school. Keywords: yesterday, last week</li>
      <li><b>Past Continuous:</b> Action happening at specific past time. <br>Structure: Subject + was/were + V¹+ing <br>Example: She was watching TV.</li>
      <li><b>Past Perfect:</b> Action completed before another past action. <br>Structure: Subject + had + V³ <br>Example: The train had left before I reached.</li>
      <li><b>Past Perfect Continuous:</b> Action continuing up to a point in past. <br>Structure: Subject + had been + V¹+ing <br>Example: He had been working for 5 hours.</li>
    </ul>

    <h5 class="font-semibold mt-2 mb-1">Future Tense</h5>
    <ul class="list-disc ml-6 space-y-1 text-gray-300">
      <li><b>Future Simple:</b> Action that will happen. <br>Structure: Subject + will + V¹ <br>Example: I will attend the meeting.</li>
      <li><b>Future Continuous:</b> Action in progress at future time. <br>Structure: Subject + will be + V¹+ing <br>Example: I will be traveling tomorrow.</li>
      <li><b>Future Perfect:</b> Action completed before a future time. <br>Structure: Subject + will have + V³ <br>Example: I will have finished the work by 5 PM.</li>
      <li><b>Future Perfect Continuous:</b> Action continuing until a future point. <br>Structure: Subject + will have been + V¹+ing <br>Example: He will have been studying for 3 hours.</li>
    </ul>

    <h4 class="font-semibold mt-4 mb-2">3️ Articles (a, an, the)</h4>
    <p>Articles are used based on sound, specificity, and uniqueness.</p>
    <ul class="list-disc ml-6 space-y-1 text-gray-300">
      <li>a → consonant sound</li>
      <li>an → vowel sound</li>
      <li>the → specific or unique object</li>
    </ul>
    <p><b>Example:</b>  He is a honest man. ✔ He is an honest man (correct – vowel sound)</p>

    <h4 class="font-semibold mt-4 mb-2">4️ Prepositions</h4>
    <p>Prepositions show the relation between noun/pronoun and other words.</p>
    <ul class="list-disc ml-6 space-y-1 text-gray-300">
      <li>Good at</li>
      <li>Interested in</li>
      <li>Senior to</li>
      <li>Depend on</li>
    </ul>
    <p><b>Example:</b>  She is good in maths. ✔ She is good at maths.</p>

    <h4 class="font-semibold mt-4 mb-2">5️ Pronouns</h4>
    <p>Pronouns must clearly refer to the correct noun and agree in number and gender.</p>
    <ul class="list-disc ml-6 space-y-1 text-gray-300">
      <li>Pronoun must agree with antecedent</li>
      <li>Avoid ambiguous reference</li>
    </ul>
    <p><b>Example:</b>  Everyone forgot their ID. ✔ Everyone forgot his/her ID.</p>
  `,

    { q: "Neither of the boys ___ present today.", options: ["are","were","is","have"], answer: 2, explanation: "'Neither' is singular, so 'is' is correct." },
    { q: "I will call you when he ___ home.", options: ["will reach","reached","reaches","has reached"], answer: 2, explanation: "In future time clauses, present tense is used." },
    { q: "She is good ___ mathematics.", options: ["in","on","at","with"], answer: 2, explanation: "Correct preposition is 'good at'." },
    { q: "We have completed ___ assignment given by the teacher.", options: ["a","an","the","no article"], answer: 2, explanation: "'The assignment' refers to a specific one." },
    { q: "He is afraid ___ dogs.", options: ["from","with","of","about"], answer: 2, explanation: "'Afraid of' is the correct phrase." },
    { q: "She ___ already finished her work.", options: ["have","has","had","is"], answer: 1, explanation: "Present perfect tense requires 'has'." },

    // 🔹 Vocabulary-Based (11–15)
    { q: "The manager ___ the employee for his honesty.", options: ["criticized","appreciated","ignored","warned"], answer: 1, explanation: "'Appreciated' fits the positive context." },
    { q: "He was ___ to hear about the accident.", options: ["excited","shocked","pleased","relaxed"], answer: 1, explanation: "An accident causes shock, not excitement." },
    { q: "The instructions were very ___ and easy to follow.", options: ["confusing","clear","lengthy","strict"], answer: 1, explanation: "'Clear' matches 'easy to follow'." },
    { q: "She ___ her anger and remained calm.", options: ["released","controlled","expressed","lost"], answer: 1, explanation: "'Controlled' fits the meaning of staying calm." },
    { q: "The doctor advised him to ___ smoking.", options: ["stop","quit","leave","avoid"], answer: 1, explanation: "'Quit smoking' is the correct phrase." },

    // 🔹 Multiple Blanks (16–20)
    { q: "She ___ the exam ___ flying colors.", options: ["passed, with","pass, in","passed, in","passes, with"], answer: 0, explanation: "Correct phrase is 'passed the exam with flying colors'." },
    { q: "He is senior ___ me ___ experience.", options: ["than, in","to, in","than, with","to, of"], answer: 1, explanation: "'Senior to' and 'in experience' are correct." },
    { q: "The meeting was postponed ___ the manager was ___ well.", options: ["because, not","since, no","as, never","because, no"], answer: 0, explanation: "Correct structure is 'because the manager was not well'." },
    { q: "Hardly ___ he entered the room ___ the lights went off.", options: ["had, when","has, then","did, than","was, when"], answer: 0, explanation: "Correct inversion: 'Hardly had he entered... when...'." },
    { q: "She has been preparing ___ the exam ___ three months.", options: ["for, since","since, for","for, for","since, since"], answer: 0, explanation: "'For' is used for duration and 'since' for point of time." }
  ]
}


};
/* ================= LOAD ================= */
const params = new URLSearchParams(window.location.search);
const topic = topics[params.get("topic")] || topics.readingComprehension;

document.getElementById("topicTitle").innerText = topic.title;

const contentBox = document.getElementById("contentBox");
const tabButtons = document.querySelectorAll(".tab-btn");

let userAnswers = [];
let shuffledPractice = [];

/* ================= HELPERS ================= */
function setActive(tab) {
  tabButtons.forEach(btn => {
    btn.classList.remove("active");
    if (btn.innerText === tab) btn.classList.add("active");
  });
}

function shuffleArray(array) {
  let a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ================= TABS ================= */
function showTab(type) {
  if (type === "concepts") {
    setActive("Concepts");
    contentBox.innerHTML = topic.concepts;
  }

  if (type === "practice") {
    setActive("Practice");

    // show passage only if it exists
    const passageObj = topic.practice.find(p => p.passage);
    const passage = passageObj ? passageObj.passage : '';

    // filter only objects with q
    shuffledPractice = shuffleArray(topic.practice.filter(p => p.q));
    userAnswers = new Array(shuffledPractice.length).fill(null);

    contentBox.innerHTML = `
      ${passage ? `<div class="mb-6 bg-black border border-gray-700 p-4 rounded-lg">${passage}</div>` : ''}

      ${shuffledPractice.map((q, i) => `
  <div class="mb-6 bg-black border border-gray-700 p-4 rounded-lg">
    <p class="font-semibold mb-2">Q${i + 1}. ${q.q}</p>

    ${q.options ? `
      ${q.options.map((o, idx) => `
        <label class="block">
          <input type="radio" name="q${i}" onclick="userAnswers[${i}] = ${idx}">
          ${o}
        </label>
      `).join("")}
    ` : `
      <input
        type="text"
        class="mt-2 w-full px-3 py-2 bg-gray-800 border border-gray-600 rounded"
        placeholder="Type your answer here"
        oninput="userAnswers[${i}] = this.value.trim().toLowerCase()"
      />
    `}

    <div id="result-${i}" class="hidden mt-2"></div>
  </div>
`).join("")}

          

      <button id="submitBtn" onclick="submitTest()"
        class="px-6 py-3 bg-lime-400 text-black font-bold rounded">
        Submit Test
      </button>

      <div id="scoreBox" class="mt-4 text-xl font-bold"></div>
    `;
  }
}

/* ================= SUBMIT ================= */
function submitTest() {
  let score = 0;

  shuffledPractice.forEach((q, i) => {
    const box = document.getElementById(`result-${i}`);
    box.classList.remove("hidden");

    if (userAnswers[i] === q.answer) {
      score++;
      box.innerHTML = `<p class="text-green-400">✔ Correct<br>${q.explanation}</p>`;
    } else {
      box.innerHTML = `
        <p class="text-red-400">✘ Wrong</p>
        <p class="text-green-400">Correct: ${q.options[q.answer]}</p>
        <p>${q.explanation}</p>
      `;
    }
  });

  document.getElementById("scoreBox").innerHTML =
    ` Your Score: <span class="text-lime-400">${score}</span> / ${shuffledPractice.length}`;

  document.getElementById("submitBtn").outerHTML = `
    <button onclick="showTab('practice')"
      class="px-6 py-3 bg-blue-400 text-black font-bold rounded">
       Practice Again
    </button>
  `;
}

/* DEFAULT */
showTab("concepts");
</script>
