<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup | Path2Placement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-black text-white min-h-screen">

<header class="flex items-center justify-between px-8 py-5 border-b border-gray-800">
  <div class="flex items-center gap-3">
    <img src="../assets/logo.png" class="h-8 w-8">
    <span class="font-bold text-lg">Path2Placement</span>
  </div>
</header>

<div class="flex items-center justify-center min-h-[80vh]">
  <div class="bg-[#111] p-8 rounded-2xl w-full max-w-md shadow-xl border border-gray-800">

    <h2 class="text-2xl font-bold mb-2">Create an account </h2>
    <p class="text-gray-400 mb-6">Start preparing smarter</p>

    <input id="name" placeholder="Full Name"
      class="w-full mb-4 px-4 py-3 rounded-lg bg-black border border-gray-700 focus:border-lime-400">

    <input id="email" placeholder="Email"
      class="w-full mb-4 px-4 py-3 rounded-lg bg-black border border-gray-700 focus:border-lime-400">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 px-4 py-3 rounded-lg bg-black border border-gray-700 focus:border-lime-400">

    <button onclick="register()"
      class="w-full bg-lime-400 text-black py-3 rounded-lg font-semibold hover:bg-lime-300 transition">
      Sign up
    </button>

    <p id="msg" class="text-sm text-red-400 mt-3"></p>

    <p class="text-sm text-gray-400 mt-6 text-center">
      Already have an account?
      <a href="login.html" class="text-lime-400 hover:underline">Login</a>
    </p>
  </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
