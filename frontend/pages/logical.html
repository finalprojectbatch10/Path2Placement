<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logical Reasoning | Path2Placement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Auth protection -->
  <script>
    if (!localStorage.getItem("user")) {
      window.location.href = "login.html";
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-black text-white min-h-screen">

<!-- HEADER -->
<header class="flex justify-between items-center px-10 py-5 border-b border-gray-800">
  <h1 class="text-xl font-bold">Logical Reasoning</h1>
  <a href="dashboard.html" class="text-gray-400 hover:text-lime-400">← Dashboard</a>
</header>

<!-- CONTENT -->
<section class="px-10 py-10 space-y-10">

  <!-- Logical Reasoning Topics -->
  <div>
    <h2 class="text-2xl font-bold mb-4"> Topics</h2>
    <div class="grid md:grid-cols-3 gap-4">
      <button onclick="openTopic('seating_arrangements')" class="topic-btn">Seating Arrangements</button>
      <button onclick="openTopic('orderAndRanking')" class="topic-btn">Order & Ranking</button>
      <button onclick="openTopic('bloodRelations')" class="topic-btn">Blood Relations</button>
      <button onclick="openTopic('syllogism')" class="topic-btn">Syllogism</button>
      <button onclick="openTopic('codingDecoding')" class="topic-btn">Coding-Decoding</button>
      <button onclick="openTopic('directionSense')" class="topic-btn">Direction Sense / Directions</button>
      <button onclick="openTopic('oddOneOut')" class="topic-btn">Odd One Out</button>
      <button onclick="openTopic('patternSeries')" class="topic-btn">Pattern Series & Sequences</button>
      <button onclick="openTopic('calendars')" class="topic-btn">Calendars</button>
      <button onclick="openTopic('clocks')" class="topic-btn">Clocks</button>
    </div>
  </div>

</section>

<!-- STYLES -->
<style>
  .topic-btn {
    background: #111;
    border: 1px solid #333;
    padding: 14px;
    border-radius: 10px;
    text-align: left;
    transition: 0.3s;
  }
  .topic-btn:hover {
    border-color: #a3e635;
  }
</style>

<!-- SCRIPT -->
<script>
  function openTopic(topic) {
    window.location.href = `logical-topic.html?topic=${topic}`;
  }
</script>

</body>
</html>
