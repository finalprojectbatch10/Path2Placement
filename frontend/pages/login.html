<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Path2Placement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-black text-white min-h-screen">

<!-- HEADER -->
<header class="flex items-center justify-between px-8 py-5 border-b border-gray-800">
  <div class="flex items-center gap-3">
    <img src="../assets/logo.png" class="h-8 w-8">
    <span class="font-bold text-lg">Path2Placement</span>
  </div>
</header>

<!-- LOGIN CARD -->
<div class="flex items-center justify-center min-h-[80vh]">
  <div class="bg-[#111] p-8 rounded-2xl w-full max-w-md shadow-xl border border-gray-800">

    <h2 class="text-2xl font-bold mb-2">Welcome back 👋</h2>
    <p class="text-gray-400 mb-6">Login to continue your journey</p>

    <input id="email" placeholder="Email"
      class="w-full mb-4 px-4 py-3 rounded-lg bg-black border border-gray-700 focus:outline-none focus:border-lime-400">
    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 px-4 py-3 rounded-lg bg-black border border-gray-700 focus:outline-none focus:border-lime-400">

    <button onclick="login()"
      class="w-full bg-lime-400 text-black py-3 rounded-lg font-semibold hover:bg-lime-300 transition">
      Login
    </button>

    <p id="msg" class="text-sm text-red-400 mt-3"></p>

    <p class="text-sm text-gray-400 mt-6 text-center">
      Don’t have an account?
      <a href="register.html" class="text-lime-400 hover:underline">Sign up</a>
    </p>
  </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
