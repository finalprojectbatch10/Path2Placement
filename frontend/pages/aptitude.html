<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aptitude | Path2Placement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-black text-white min-h-screen">

<!-- HEADER -->
<header class="flex items-center justify-between px-10 py-5 border-b border-gray-800">
  <div class="flex items-center gap-3">
    <img src="../assets/logo.png" class="h-8 w-8" />
    <span class="font-bold text-lg">Path2Placement</span>
  </div>

<a href="dashboard.html" class="text-gray-400 hover:text-lime-400">
  ← Back to Dashboard
</a>

</header>

<!-- TITLE -->
<section class="px-10 py-10">
  <h1 class="text-3xl font-bold">Aptitude</h1>
  <p class="text-gray-400 mt-2">
    Strengthen your fundamentals for placements
  </p>
</section>

<!-- APTITUDE SECTIONS -->
<section class="px-10 pb-16">
  <div class="grid md:grid-cols-3 gap-6 max-w-5xl">

    <!-- Quantitative -->
    <div onclick="location.href='quantitative.html'"
         class="cursor-pointer bg-gray-900 border border-gray-800 rounded-xl p-8
                hover:border-lime-400 transition">
      <h3 class="text-xl font-bold mb-2">Quantitative Aptitude</h3>
      <p class="text-gray-400 text-sm">
        Numbers, formulas & problem solving
      </p>
    </div>

    <!-- Logical -->
    <div onclick="location.href='logical.html'"
         class="cursor-pointer bg-gray-900 border border-gray-800 rounded-xl p-8
                hover:border-lime-400 transition">
      <h3 class="text-xl font-bold mb-2">Logical Reasoning</h3>
      <p class="text-gray-400 text-sm">
        Patterns, puzzles & analytical thinking
      </p>
    </div>

    <!-- Verbal -->
    <div onclick="location.href='verbal.html'"
         class="cursor-pointer bg-gray-900 border border-gray-800 rounded-xl p-8
                hover:border-lime-400 transition">
      <h3 class="text-xl font-bold mb-2">Verbal Ability</h3>
      <p class="text-gray-400 text-sm">
        Grammar, comprehension & vocabulary
      </p>
    </div>

  </div>
</section>

</body>
</html>
