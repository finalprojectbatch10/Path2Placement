<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HR Interview Practice</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Inter',sans-serif;}
</style>

</head>

<body class="bg-black text-white min-h-screen">

<header class="px-10 py-6 border-b border-gray-800 flex justify-between">
<h1 class="font-bold text-xl">HR Interview Practice</h1>

<button onclick="location.href='dashboard.html'"
class="text-lime-400">
← Dashboard
</button>
</header>


<section class="px-10 py-10 max-w-3xl mx-auto">

<div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
<h2 class="text-lg font-semibold mb-1">HR Question</h2>

<p id="questionCount" class="text-sm text-gray-400 mb-2"></p>

<p id="question" class="text-gray-300 text-lg mb-6"></p>

<button onclick="startSpeech()"
class="bg-lime-400 text-black px-6 py-2 rounded-lg font-semibold">
🎤 Start Answer
</button>

<button onclick="submitAnswer()"
class="ml-3 bg-blue-500 px-6 py-2 rounded-lg">
Submit Answer
</button>

</div>


<div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mt-6">

<h3 class="font-semibold mb-2">Your Answer</h3>

<p id="speechText" class="text-gray-300"></p>

</div>


<div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mt-6">

<div id="result"></div>

<div class="mt-4">
<button id="nextBtn" onclick="nextQuestion()"
class="bg-gray-700 px-6 py-2 rounded-lg hidden">
Next Question
</button>
</div>

</div>

</section>

<script src="../js/hr_interview.js"></script>

</body>
</html>
