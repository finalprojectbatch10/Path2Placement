    <p class="mb-3">
      In a proportion <b>a : b :: c : d</b>:

      <li>Compound Ratio: (a:b) × (c:d) = ac : bd</li>
      <li>Duplicate Ratio of a:b → a² : b²</li>
      <li>Triplicate Ratio of a:b → a³ : b³</li>
      <li>Inverse Ratio of a:b → b : a</li>
    </ul>

    <p class="mt-3 text-lime-400">

    </p>

      <b>empty</b> the tank do <b>negative work</b>.
    </p>

    <p class="mb-3">
      The key idea is to calculate how much part of the tank is filled or emptied

mixtures_alligations:{
  "title": "Mixtures & Alligations",
  "concepts": "<h3 class='text-lg font-bold mb-3'>Basic Concepts</h3> \
<p class='mb-3'>Mixtures and Alligations problems deal with the combination of two or more ingredients having different strengths, costs, or concentrations to form a mixture of a desired strength or mean value. These questions are common in placement exams as they test <b>ratio understanding, percentages,</b> and <b>logical reasoning.</b></p> \
<p class='mb-3'>A mixture is formed by mixing substances like milk & water, alcohol & water, or two types of rice. <b>Alligation</b> is a rule used to find the ratio in which ingredients must be mixed to get a mixture of given strength or price.</p> \
<h4 class='font-semibold mt-4 mb-2'>Alligation Rule (Core Concept)</h4> \
<p class='mb-3'>If two ingredients with values C₁ (lower) and C₂ (higher) are mixed to get mean value M:</p> \
<p class='mb-3'><b>Quantity of C₁ : Quantity of C₂ = (C₂ − M) : (M − C₁)</b></p> \
<p class='mb-3'>Applicable for cost per unit, percentage concentration, and strength of solution.</p> \
<h4 class='font-semibold mt-4 mb-2'>Important Formulas</h4> \
<ul class='list-disc ml-6 space-y-1 text-gray-300'> \
<li>If x liters of water is added to y liters of milk: New quantity = x + y; Milk % = (y / (x + y)) × 100</li> \
<li>If x liters of mixture is replaced repeatedly with water: Final quantity = Initial × (1 − x / Total)ⁿ, where n = replacements</li> \
<li>Weighted Average: Mean Value = (Σ(Quantity × Value)) / Total Quantity</li> \
</ul>",
  
  "formulas": [
    "Milk percentage = (Quantity of milk / Total mixture) × 100",
    "Alligation ratio = (C₂ − M) : (M − C₁)",
    "Final quantity after n replacements = Initial × (1 − x / Total)^n",
    "Weighted average (mean) = Sum of (Quantity × Value) / Total Quantity"

    "concepts": "<h3 class='text-lg font-bold mb-3'>What is an Inequality?</h3><p class='mb-3'>An inequality is a mathematical statement that compares two expressions using symbols:</p><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>&gt; : Greater than</li><li>&lt; : Less than</li><li>&ge; : Greater than or equal to</li><li>&le; : Less than or equal to</li></ul><p class='mb-3'>Examples: x &gt; 3, 2x − 5 &le; 7</p><h4 class='font-semibold mt-4 mb-2'>Types of Inequalities</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Linear Inequality in One Variable (e.g., 3x − 4 &gt; 8)</li><li>Linear Inequality in Two Variables (e.g., 2x + y &le; 6)</li><li>Compound Inequality (e.g., 1 &lt; x &le; 5)</li><li>Quadratic Inequality (e.g., x² − 5x + 6 &gt; 0)</li></ul><h4 class='font-semibold mt-4 mb-2'>Rules of Inequalities (Important for Placements)</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Add/Subtract same number → sign does not change</li><li>Multiply/Divide by positive number → sign does not change</li><li>Multiply/Divide by negative number → reverse sign</li></ul><h4 class='font-semibold mt-4 mb-2'>Quadratic Inequalities Key Concept</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Convert into standard form</li><li>Find roots of quadratic equation</li><li>Draw number line</li><li>Check sign of expression in intervals</li></ul><h4 class='font-semibold mt-4 mb-2'>Important Formulas & Results</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Quadratic Expression: ax² + bx + c = 0, roots: x = [-b ± √(b²−4ac)]/2a</li><li>Solution Rules: ax² + bx + c &gt; 0 → Outside roots, ax² + bx + c &lt; 0 → Between roots (for a &gt; 0)</li></ul>",

triangles: {
  title: "Triangles",
  concepts: "<h3 class='text-lg font-bold mb-3'>Meaning of Triangle</h3><p class='mb-3'>A triangle is a polygon with three sides, three angles, and three vertices. The sum of interior angles of any triangle is 180°.</p><h4 class='font-semibold mt-4 mb-2'>Types of Triangles</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li><b>Based on sides:</b> Equilateral (all sides equal), Isosceles (two sides equal), Scalene (all sides unequal)</li><li><b>Based on angles:</b> Acute (<90°), Right (90°), Obtuse (>90°)</li></ul><h4 class='font-semibold mt-4 mb-2'>Properties</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Sum of interior angles = 180°</li><li>Exterior angle = sum of two opposite interior angles</li><li>Longer side is opposite larger angle</li><li>Sum of any two sides > third side (Triangle Inequality)</li></ul><h4 class='font-semibold mt-4 mb-2'>Important Formulas</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Area = 1/2 × base × height</li><li>Heron’s Formula: s=(a+b+c)/2, Area=√(s(s−a)(s−b)(s−c))</li><li>Pythagoras: Hypotenuse² = Base² + Perpendicular²</li><li>30°–60°–90° sides = 1:√3:2, 45°–45°–90° sides = 1:1:√2</li><li>Similar Triangles: AAA, SSS, SAS; area ratio = square of side ratio</li><li>Congruent Triangles: SSS, SAS, ASA, RHS</li></ul>",

circles: {
  title: "Circles",
  concepts: "<h3 class='text-lg font-bold mb-3'>What is a Circle?</h3><p class='mb-3'>A circle is the set of all points in a plane that are at a fixed distance (radius) from a fixed point called the center.</p><h4 class='font-semibold mt-4 mb-2'>Important Terms</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Radius (r): Distance from center to any point on circle</li><li>Diameter (d): Twice the radius → d = 2r</li><li>Chord: Line joining two points on circle</li><li>Diameter: Longest chord</li><li>Arc: Part of the circumference</li><li>Sector: Region enclosed by two radii and an arc</li><li>Segment: Region enclosed by a chord and an arc</li><li>Tangent: Line touching circle at exactly one point</li><li>Secant: Line cutting the circle at two points</li></ul><h4 class='font-semibold mt-4 mb-2'>Basic Properties</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Diameter is the longest chord</li><li>Perpendicular from center to chord bisects the chord</li><li>Equal chords are equidistant from center</li><li>Angle in a semicircle = 90°</li><li>Tangent at any point is perpendicular to radius</li></ul><h4 class='font-semibold mt-4 mb-2'>Important Formulas</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Circumference = 2πr</li><li>Area = πr²</li><li>Area of Semicircle = 1/2 πr²</li><li>Circumference of Semicircle = πr + 2r</li><li>Arc Length = (θ/360) × 2πr</li><li>Area of Sector = (θ/360) × πr²</li><li>Tangents from external point are equal</li><li>Angle between tangent and radius = 90°</li><li>Concentric circles share same center</li></ul>",

hcf_lcm: {
  title: "HCF & LCM",
  concepts: "<h3 class='text-lg font-bold mb-3'>HCF & LCM</h3><p class='mb-3'>HCF (Highest Common Factor) and LCM (Least Common Multiple) are fundamental for solving number theory and arithmetic problems in placements.</p><h4 class='font-semibold mt-4 mb-2'>1. HCF (Highest Common Factor)</h4><p class='mb-3'>Largest number that divides two or more numbers exactly. Also called GCD (Greatest Common Divisor). Example: Numbers = 12, 18 → HCF = 6</p><h4 class='font-semibold mt-4 mb-2'>2. LCM (Least Common Multiple)</h4><p class='mb-3'>Smallest number divisible by two or more numbers. Example: Numbers = 12, 18 → LCM = 36</p><h4 class='font-semibold mt-4 mb-2'>3. Important Properties</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>HCF × LCM = Product of numbers</li><li>If one number divides another, HCF = smaller number, LCM = larger number</li><li>HCF of co-prime numbers = 1</li></ul><h4 class='font-semibold mt-4 mb-2'>4. Methods to Find HCF & LCM</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>Prime Factorization Method: Factor numbers into primes. HCF = product of common primes with smallest powers, LCM = product of all primes with highest powers</li><li>Division (Euclidean) Method: Divide larger number by smaller, take remainder until remainder = 0. Last divisor = HCF</li><li>LCM Using HCF: LCM = (a × b)/HCF(a,b)</li></ul><h4 class='font-semibold mt-4 mb-2'>5. HCF & LCM of More than Two Numbers</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>HCF(a,b,c) = HCF(HCF(a,b), c)</li><li>LCM(a,b,c) = LCM(LCM(a,b), c)</li></ul><h4 class='font-semibold mt-4 mb-2'>6. Special Cases</h4><ul class='list-disc ml-6 space-y-1 text-gray-300'><li>HCF of co-prime numbers = 1</li><li>LCM of co-prime numbers = product of numbers</li></ul>",
  formulas: [
    "HCF × LCM = Product of numbers",
    "LCM = (a × b) / HCF(a,b)",

    "LCM(a, b, c) = LCM(LCM(a,b), c)"

/* ================= LOAD ================= */
const params = new URLSearchParams(window.location.search);
const topic = topics[params.get("topic")] || topics.percentages;
document.getElementById("topicTitle").innerText = topic.title;

const contentBox = document.getElementById("contentBox");
const tabButtons = document.querySelectorAll(".tab-btn");

let userAnswers = [];
let shuffledPractice = [];

/* ================= HELPERS ================= */
function setActive(tab) {
  tabButtons.forEach(btn => {
    btn.classList.remove("active");
    if (btn.innerText === tab) btn.classList.add("active");
  });
}

function shuffleArray(array) {
  let a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ================= TABS ================= */
function showTab(type) {
  if (type === "concepts") {
    setActive("Concepts");
    contentBox.innerHTML = topic.concepts;
  }

  if (type === "formulas") {
    setActive("Formulas");
    contentBox.innerHTML = `
      <ul class="list-disc ml-6 space-y-2">
        ${topic.formulas.map(f => `<li>${f}</li>`).join("")}
      </ul>
    `;
  }

  if (type === "practice") {
    setActive("Practice");

    shuffledPractice = shuffleArray(topic.practice);
    userAnswers = new Array(shuffledPractice.length).fill(null);

    contentBox.innerHTML = `
      ${shuffledPractice.map((q, i) => `
        <div class="mb-6 bg-black border border-gray-700 p-4 rounded-lg">
          <p class="font-semibold mb-2">Q${i+1}. ${q.q}</p>
          ${q.options.map((o, idx) => `
            <label class="block">
              <input type="radio" name="q${i}" onclick="userAnswers[${i}] = ${idx}">
              ${o}
            </label>
          `).join("")}
          <div id="result-${i}" class="hidden mt-2"></div>
        </div>
      `).join("")}

      <button id="submitBtn" onclick="submitTest()"
        class="px-6 py-3 bg-lime-400 text-black font-bold rounded">
        Submit Test
      </button>

      <div id="scoreBox" class="mt-4 text-xl font-bold"></div>
    `;
  }
}

/* ================= SUBMIT ================= */
function submitTest() {
  let score = 0;

  shuffledPractice.forEach((q, i) => {
    const box = document.getElementById(`result-${i}`);
    box.classList.remove("hidden");

    if (userAnswers[i] === q.answer) {
      score++;
      box.innerHTML = `<p class="text-green-400">✔ Correct<br>${q.explanation}</p>`;
    } else {
      box.innerHTML = `
        <p class="text-red-400">✘ Wrong</p>
        <p class="text-green-400">Correct: ${q.options[q.answer]}</p>
        <p>${q.explanation}</p>
      `;
    }
  });

  document.getElementById("scoreBox").innerHTML =
    ` Your Score: <span class="text-lime-400">${score}</span> / ${shuffledPractice.length}`;

  document.getElementById("submitBtn").outerHTML = `
    <button onclick="showTab('practice')"
      class="px-6 py-3 bg-blue-400 text-black font-bold rounded">
       Practice Again
    </button>
  `;
}

/* DEFAULT */
showTab("concepts");
